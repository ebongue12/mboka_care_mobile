name: Build APK MBOKA-CARE

on:
  push:
    branches: [ main, production-v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK debug (verbose)
        run: flutter build apk --debug --verbose
      
      - name: List build outputs
        if: always()
        run: |
          echo "=== Contenu build/ ==="
          ls -laR build/ || echo "Dossier build/ vide"
          echo ""
          echo "=== Recherche APK ==="
          find . -name "*.apk" -type f || echo "Aucun APK trouvé"
      
      - name: Upload APK if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mboka-care-debug
          path: |
            build/app/outputs/**/*.apk
            build/**/*.apk
          if-no-files-found: warn
