name: Build APK MBOKA-CARE

on:
  push:
    branches: [ main, production-v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK with Gradle wrapper generation
        run: |
          # Générer le wrapper Gradle si manquant
          cd android
          if [ ! -f "gradlew" ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper
          fi
          cd ..
          
          # Build l'APK
          flutter build apk --debug --verbose 2>&1 | tee build.log || true
          
      - name: Show last 100 lines of build log
        if: always()
        run: tail -100 build.log || echo "No build log"
          
      - name: Search for APK everywhere
        if: always()
        run: |
          echo "=== ALL APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"
          
          echo ""
          echo "=== android/ structure ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "outputs/ not found"
      
      - name: Upload any APK found
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mboka-care-any-apk
          path: |
            **/*.apk
          if-no-files-found: warn
