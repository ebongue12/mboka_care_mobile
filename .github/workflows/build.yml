name: Build APK MBOKA-CARE

on:
  push:
    branches: [ main, production-v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK debug
        continue-on-error: true
        run: flutter build apk --debug
          
      - name: Find and copy APK (always run)
        if: always()
        run: |
          echo "=== Recherche de l'APK ==="
          find build -name "*.apk" -type f
          
          APK_PATH=$(find build -name "app-debug.apk" -type f | head -n 1)
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ APK trouvé : $APK_PATH"
            mkdir -p output
            cp "$APK_PATH" output/mboka-care-debug.apk
            ls -lh output/
          else
            echo "❌ Aucun APK trouvé"
            exit 1
          fi
      
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mboka-care-debug
          path: output/mboka-care-debug.apk
          if-no-files-found: error
