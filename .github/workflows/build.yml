name: Build APK MBOKA-CARE

on:
  push:
    branches: [ main, production-v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run Gradle directly to see real errors
        working-directory: android
        run: |
          echo "=== Running Gradle assembleDebug directly ==="
          ./gradlew assembleDebug --stacktrace --info
          
      - name: List all outputs
        if: always()
        run: |
          echo "=== android/app/build/outputs/ ==="
          ls -laR android/app/build/outputs/ || echo "Dossier vide"
          
          echo "=== Recherche globale APK ==="
          find . -name "*.apk" -type f || echo "Aucun APK"
      
      - name: Upload APK if found
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mboka-care-debug
          path: |
            android/app/build/outputs/**/*.apk
            build/app/outputs/**/*.apk
          if-no-files-found: warn
