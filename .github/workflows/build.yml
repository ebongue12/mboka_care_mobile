name: Build APK MBOKA-CARE

on:
  push:
    branches: [ main, production-v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK debug
        run: flutter build apk --debug
      
      - name: Find APK
        run: |
          echo "Recherche de l'APK..."
          find build -name "*.apk" -type f
          ls -la build/app/outputs/flutter-apk/ || echo "Dossier flutter-apk introuvable"
          ls -la build/app/outputs/apk/debug/ || echo "Dossier apk/debug introuvable"
      
      - name: Upload APK (flutter-apk)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: mboka-care-debug-flutter
          path: build/app/outputs/flutter-apk/app-debug.apk
      
      - name: Upload APK (apk/debug)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: mboka-care-debug-standard
          path: build/app/outputs/apk/debug/app-debug.apk
      
      - name: Upload all APKs found
        uses: actions/upload-artifact@v4
        with:
          name: mboka-care-all-apks
          path: build/**/*.apk
