name: Build APK MBOKA-CARE

on:
  push:
    branches: [ main, production-v1.0 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK debug
        run: |
          flutter build apk --debug
          echo "✅ Build terminé"
          
      - name: Find and copy APK
        run: |
          # Chercher l'APK
          APK_PATH=$(find build -name "app-debug.apk" -type f | head -n 1)
          echo "APK trouvé : $APK_PATH"
          
          # Créer dossier de sortie
          mkdir -p output
          
          # Copier l'APK
          cp "$APK_PATH" output/mboka-care-debug.apk
          
          echo "✅ APK copié vers output/mboka-care-debug.apk"
          ls -lh output/
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mboka-care-debug
          path: output/mboka-care-debug.apk
