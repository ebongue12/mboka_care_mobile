name: mboka_care_mobile
description: "Application de gestion de santé MBOKA-CARE"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.0
  http: ^1.1.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  jwt_decoder: ^2.0.1
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # NOTIFICATIONS PRODUCTION
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  awesome_notifications: ^0.9.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
